<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Griglia Feedback L2 v5 - CSP Fix Completo v5</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://*.supabase.co; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.supabase.co wss://*.supabase.co; img-src 'self' data: https:; object-src 'none'; frame-src 'none'; worker-src 'self' blob:;">
  <style>
    /* Your existing styles here - copy from your v3 file */
    /* ... (keeping it minimal for now) */
    body { font-family: system-ui, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; }
    .csp-notice { background: #e3f2fd; border: 1px solid #2196f3; padding: 15px; border-radius: 8px; margin: 20px 0; }
    .config-box { background: #f5f5f5; padding: 20px; border-radius: 8px; margin: 20px 0; }
  </style>
</head>
<body>
  <h1>✅ Griglia Feedback L2 v5 - CSP Fix</h1>
  <div class="csp-notice">
    <strong>Status CSP:</strong> 'unsafe-eval' e Supabase autorizzati. Il warning rosso dovrebbe sparire.
  </div>

  <div class="config-box">
    <h3>Configurazione Supabase (modifica qui):</h3>
    <textarea id="config-area" rows="4" cols="80" style="width:100%; font-family:monospace;">window.SUPABASE_URL = 'https://nvbdmnjxytblemhenfnm.supabase.co'; // ← SOSTITUISCI
window.SUPABASE_ANON_KEY = 'sb_publishable_zxHSTopn4bb17BDhBwEi3g_v_HYPI97'; // ← SOSTITUISCI</textarea>
    <br><button onclick="applyConfig()">Applica Config</button>
    <button onclick="testSupabase()">Test Supabase Client</button>
  </div>

  <div id="status" style="padding:15px; border-radius:8px; margin:20px 0;"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // Configurazione globale - accessibile ovunque
    window.SUPABASE_URL = 'https://nvbdmnjxytblemhenfnm.supabase.co'; // ← SOSTITUISCI CON LA TUA
    window.SUPABASE_ANON_KEY = 'sb_publishable_zxHSTopn4bb17BDhBwEi3g_v_HYPI97'; // ← SOSTITUISCI CON LA TUA

    console.log('✅ Configurazione caricata:', window.SUPABASE_URL);

    function setStatus(msg, color = 'black') {
      document.getElementById('status').innerHTML = `<strong style="color:${color}">${msg}</strong>`;
    }

    function applyConfig() {
      const config = document.getElementById('config-area').value;
      try {
        eval(config);
        setStatus('✅ Configurazione applicata!', 'green');
        console.log('SUPABASE_URL:', window.SUPABASE_URL);
        console.log('SUPABASE_ANON_KEY:', window.SUPABASE_ANON_KEY.substring(0,20) + '...');
      } catch(e) {
        setStatus('❌ Errore config: ' + e.message, 'red');
      }
    }

    async function testSupabase() {
      setStatus('Test in corso...', 'orange');
      try {
        const supabase = window.supabase?.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
        if (!supabase) throw new Error('Supabase library non caricata');

        const { data: { session } } = await supabase.auth.getSession();
        setStatus(session ? `✅ Client OK - Utente: ${session.user?.email || session.user?.id}` : '✅ Client OK - Anonimo', 'green');
        console.log('Supabase test OK');
      } catch(e) {
        setStatus('❌ Test fallito: ' + e.message, 'red');
        console.error(e);
      }
    }

    // Test automatico all'avvio
    window.addEventListener('load', () => {
      console.log('CSP v5 caricata. Prova i pulsanti sopra.');
      setStatus('Caricamento completato. Prova "Applica Config" e "Test Supabase".');
    });
  </script>

  <hr>
  <h3>Test Console</h3>
  <p>Apri Console (F12) e digita:</p>
  <code>window.SUPABASE_URL<br>window.SUPABASE_ANON_KEY<br>testSupabase()</code>
</body>
</html>
